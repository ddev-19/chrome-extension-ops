<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

    body {
      width: 260px;
      background: #0f172a;
      color: #f1f5f9;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px;
    }

    .header-text h1 { font-size: 13px; font-weight: 600; }
    .header-text p  { font-size: 11px; color: #64748b; margin-top: 1px; }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle-sub   { font-size: 10px; color: #64748b; margin-top: 2px; }

    .switch {
      position: relative; display: inline-block;
      width: 44px; height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #334155; border-radius: 24px;
      transition: 0.3s;
    }
    .slider:before {
      position: absolute; content: "";
      height: 18px; width: 18px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #6366f1; }
    input:checked + .slider:before { transform: translateX(20px); }

    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 11px;
      background: #1e293b;
      color: #64748b;
      text-align: center;
      margin-bottom: 14px;
    }
    .status.on  { background: #14532d; color: #86efac; }
    .status.off { background: #1e293b; color: #64748b; }

    .legend { margin-bottom: 14px; }
    .legend-title {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; color: #475569; margin-bottom: 8px;
    }
    .legend-item {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 5px;
      font-size: 11px; color: #94a3b8;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .settings { padding-top: 12px; border-top: 1px solid #1e293b; }
    .settings label {
      font-size: 10px; color: #475569;
      text-transform: uppercase; letter-spacing: 0.08em;
      display: block; margin-bottom: 4px;
    }
    .settings input {
      width: 100%; padding: 7px 10px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #f1f5f9;
      font-size: 11px; margin-bottom: 8px;
    }
    .settings input:focus { outline: none; border-color: #6366f1; }
    .btn {
      width: 100%; padding: 8px;
      background: #6366f1; color: white;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">DP</div>
    <div class="header-text">
      <h1>User Identifier</h1>
      <p>DreamPlay Ops Panel</p>
    </div>
  </div>

  <!-- The one toggle — like an adblocker -->
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Auto Identify</div>
      <div class="toggle-sub">Highlights all USER IDs automatically</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="masterToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status off" id="status">Turn on to start identifying users</div>

  <div class="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-item"><div class="dot" style="background:#22c55e"></div> Sportan</div>
    <div class="legend-item"><div class="dot" style="background:#3b82f6"></div> DreamPlay Employee</div>
    <div class="legend-item"><div class="dot" style="background:#f97316"></div> Ex-Sportan</div>
    <div class="legend-item"><div class="dot" style="background:#a855f7"></div> Ex-DreamPlay Employee</div>
    <div class="legend-item"><div class="dot" style="background:#ef4444"></div> Test UserID</div>
    <div class="legend-item"><div class="dot" style="background:#475569"></div> Unknown</div>
  </div>

  <div class="settings">
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:8080" />
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="your-api-key" />
    <button class="btn" id="saveSettings">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
